# Archivo de orquestación de Docker Compose para la infraestructura local.
# Define los servicios necesarios para ejecutar la aplicación en un entorno de desarrollo.

services:
  # Servicio de base de datos PostgreSQL
  postgres:
    # Utilizamos la imagen oficial de PostgreSQL versión 16
    image: postgres:16
    # Nombre del contenedor para facilitar su identificación y administración
    container_name: inventory_postgres
    # Configuración de variables de entorno para inicializar la base de datos
    environment:  
      # Usuario administrador de la base de datos
      POSTGRES_USER: inventory_user
      # Contraseña del usuario administrador
      POSTGRES_PASSWORD: inventory_password
      # Nombre de la base de datos que se creará al iniciar el contenedor
      POSTGRES_DB: inventory_db
    # Mapeo de puertos: el puerto 5432 del host se redirige al puerto 5432 del contenedor
    ports:
      - "5432:5432"
    # Configuración de volúmenes para persistir los datos de la base de datos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de init: crea la base keycloak_db. Solo corre si el volumen está vacío.
      - ./init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql

    # Healthcheck: Keycloak espera a que esto pase antes de arrancar.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    # Reiniciar automáticamente el contenedor si falla
    restart: unless-stopped

  # Servicio de Gestión de Identidad y Acceso (Keycloak)
  keycloak:
    # Utilizamos la imagen oficial de Keycloak proporcionada por RedHat (Quay)
    image: quay.io/keycloak/keycloak:26.0
    # Nombre del contenedor para facilitar su identificación y administración
    container_name: inventory_keycloak
    # Comando de inicio: 'start-dev' arranca Keycloak en modo desarrollo (ideal para local).
    # '--import-realm' fuerza a Keycloak a buscar e importar archivos JSON en /opt/keycloak/data/import/ al inicio.
    command: start-dev --import-realm
    # Variables de entorno requeridas para la configuración inicial y conexión a la base de datos
    environment:
      # Admin bootstrap (Keycloak 26.x usa KC_BOOTSTRAP_ADMIN_*)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Conexión a la base DEDICADA de Keycloak (no la de la app)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: inventory_user
      KC_DB_PASSWORD: inventory_password
      # Variables consumidas por realm-export.json vía sustitución ${...}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TEST_USER_PASSWORD: ${KEYCLOAK_TEST_USER_PASSWORD}

    # Mapeo de puertos: Redirigimos el puerto 9080 del host al 8080 del contenedor (puerto por defecto de Keycloak)
    # Se usa 9080 en el host para evitar conflictos con el puerto 8080 por defecto que suele utilizar Spring Boot
    ports:
      - "9080:8080"
    # Mapeo de volúmenes: montamos el directorio local 'keycloak' hacia el contenedor
    # Esto permite que Keycloak lea el archivo 'realm-export.json' e importe la configuración automáticamente
    volumes:
      - ./keycloak:/opt/keycloak/data/import/
    # Espera a que Postgres esté REALMENTE listo, no solo arrancado.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/inventory_db
      - SPRING_DATASOURCE_USERNAME=inventory_user
      - SPRING_DATASOURCE_PASSWORD=inventory_password
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/Inventario/protocol/openid-connect/certs
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:9080/realms/Inventario
      # Cliente de administración de Keycloak (KeycloakAdminService): el backend
      # llega a Keycloak por la red interna de Docker y usa la service account de
      # 'inventory-client' con el mismo secreto que importa el realm.
      - KEYCLOAK_ADMIN_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_ADMIN_REALM=Inventario
      - KEYCLOAK_ADMIN_CLIENT_ID=inventory-client
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      # Configuraciones de OpenTelemetry para enrutar telemetría hacia Grafana Alloy
      - OTEL_SERVICE_NAME=inventory-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://localhost:9080/realms/Inventario
        VITE_KEYCLOAK_CLIENT_ID: inventory-client
        VITE_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    container_name: inventory_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

# Declaración de volúmenes nombrados
volumes:
  # Volumen persistente para almacenar los datos de PostgreSQL y evitar pérdida al reiniciar
  postgres_data:
