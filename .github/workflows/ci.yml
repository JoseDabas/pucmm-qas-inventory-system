name: CI

on:
  pull_request:
    branches: [main] # Corre en cada PR a main

jobs: # Define los trabajos que se ejecutarán en el workflow
  backend-build: # Define el trabajo para construir el backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build backend
        run: ./gradlew build -x test

  backend-unit-tests: # Ejecuta las pruebas unitarias y del API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit and API tests
        run: ./gradlew test --tests "*ProductTest" --tests "*CategoryTest" --tests "*ProductServiceTest" --tests "*ProductControllerApiTest" --tests "*ProductApiContractTest"

  backend-integration-tests: # Ejecuta las pruebas de integración con Testcontainers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run integration tests (Testcontainers)
        run: ./gradlew test --tests "*IntegrationTest"

  backend-security-scan: # Ejecuta pruebas de seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      # Ejecutar Snyk Security Scan para el backend
      - name: Snyk Security Scan (DEV-6)
        uses: snyk/actions/gradle@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-subprojects
      
      # QA-3 (Futuras iteraciones): Validación de contrato OpenAPI con Schemathesis
      # Este paso está comentado hasta que la aplicación esté levantada en el pipeline 
      # para poder acceder al endpoint /v3/api-docs
      # - name: Validate OpenAPI Contract
      #   run: |
      #     docker run --rm --network host schemathesis/schemathesis \
      #       run http://localhost:8080/v3/api-docs \
      #       --checks all

  frontend-build: # Define el trabajo para construir el frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
