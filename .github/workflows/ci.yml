name: CI

on:
  pull_request:
    branches: [main] # Corre en cada PR a main

jobs: # Define los trabajos que se ejecutarán en el workflow
  backend-build: # Define el trabajo para construir el backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build backend
        run: ./gradlew build -x test

  backend-unit-tests: # Ejecuta las pruebas unitarias y del API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit and API tests
        run: ./gradlew test --tests "*ProductTest" --tests "*CategoryTest" --tests "*ProductServiceTest" --tests "*ProductControllerApiTest" --tests "*ProductApiContractTest"

  backend-integration-tests: # Ejecuta las pruebas de integración con Testcontainers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run integration tests (Testcontainers)
        run: ./gradlew test --tests "*IntegrationTest"

  backend-security-scan: # Ejecuta pruebas de seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      # 1. Restaurar el caché (si existe de ejecuciones anteriores)
      - name: Restore NVD Database Cache
        uses: actions/cache/restore@v4
        id: cache-nvd
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-nvd-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nvd-

      - name: Debug Secret Availability
        run: |
          if [ -z "${{ secrets.NVD_API_KEY }}" ]; then
            echo "❌ El secreto NVD_API_KEY está VACÍO. GitHub no lo está inyectando en esta rama."
            exit 1
          else
            echo "✅ El secreto NVD_API_KEY sí está cargando correctamente."
          fi

      # 2. Ejecutar OWASP pasando la API Key como variable de entorno para que Gradle la lea
      - name: OWASP Dependency Check (DEV-6)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      # 3. EL FIX CRÍTICO: Guardar el caché INCLUSO SI EL PASO ANTERIOR FALLA (403)
      - name: Save NVD Database Cache
        uses: actions/cache/save@v4
        if: always() # <-- Esto obliga a GitHub a guardar lo que logró descargar
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-nvd-${{ github.run_id }}
      
      # QA-3 (Futuras iteraciones): Validación de contrato OpenAPI con Schemathesis
      # Este paso está comentado hasta que la aplicación esté levantada en el pipeline 
      # para poder acceder al endpoint /v3/api-docs
      # - name: Validate OpenAPI Contract
      #   run: |
      #     docker run --rm --network host schemathesis/schemathesis \
      #       run http://localhost:8080/v3/api-docs \
      #       --checks all

  frontend-build: # Define el trabajo para construir el frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
