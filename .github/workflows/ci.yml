name: CI

on:
  pull_request:
    branches: [main] # Corre en cada PR a main
  push:
    branches: [main] # Analiza main al mergear, para que el dashboard de SonarCloud muestre su Quality Gate

jobs: # Define los trabajos que se ejecutarán en el workflow
  backend-build: # Define el trabajo para construir el backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build backend
        run: ./gradlew build -x test

  backend-unit-tests: # Ejecuta las pruebas unitarias y del API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run unit and API tests
        run: ./gradlew test --tests "*ProductTest" --tests "*CategoryTest" --tests "*ProductServiceTest" --tests "*ProductControllerApiTest" --tests "*ProductApiContractTest" --tests "*GlobalExceptionHandlerTest" --tests "*TelemetryContextFilterTest" --tests "*JwtValidationApiTest" --tests "*CorsValidationApiTest"
  backend-integration-tests: # Ejecuta las pruebas de integración con Testcontainers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run integration tests (Testcontainers)
        run: ./gradlew test --tests "*IntegrationTest"

  backend-security-scan: # Ejecuta pruebas de seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Instalar Snyk CLI nativo para respetar el working-directory
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      # Ejecutar Snyk Security Scan para el backend
      - name: Snyk Security Scan (DEV-6)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-subprojects
        continue-on-error: true

      # OWASP Dependency-Check (SCA): analiza dependencias contra la base NVD de CVEs.
      # Requiere el secret NVD_API_KEY para evitar el rate-limit de descarga de la NVD.
      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true

      # Publicar el reporte HTML de Dependency-Check como artefacto descargable.
      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/build/reports/dependency-check-report.*
          if-no-files-found: ignore

      # QA-3 (Futuras iteraciones): Validación de contrato OpenAPI con Schemathesis
      # Este paso está comentado hasta que la aplicación esté levantada en el pipeline
      # para poder acceder al endpoint /v3/api-docs
      # - name: Validate OpenAPI Contract
      #   run: |
      #     docker run --rm --network host schemathesis/schemathesis \
      #       run http://localhost:8080/v3/api-docs \
      #       --checks all

  backend-sonarqube: # Análisis de calidad con SonarCloud (Coverage, Bugs, Vulnerabilities, Code Smells y Duplicación)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth especifica cuántos commits de historial se deben recuperar.
          fetch-depth: 0 # Sonar necesita el historial completo para el blame y la decoración del PR
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run tests, coverage and SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Permite que SonarCloud decore el PR
        # El comando de prueba excluye InventorySystemApplicationTests para evitar que falle el pipeline debido a la falta de configuración de la base de datos en el entorno de CI.
        run: ./gradlew test --tests "*ProductTest" --tests "*CategoryTest" --tests "*ProductServiceTest" --tests "*ProductControllerApiTest" --tests "*ProductApiContractTest" --tests "*IntegrationTest" --tests "*GlobalExceptionHandlerTest" --tests "*TelemetryContextFilterTest" --tests "*JwtValidationApiTest" --tests "*CorsValidationApiTest" jacocoTestReport sonar

  frontend-build: # Define el trabajo para construir el frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  openapi-contract-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          
      - name: Start Database and Keycloak via Docker Compose
        working-directory: infrastructure
        env:
          KEYCLOAK_CLIENT_SECRET: "dummy-secret-for-ci"
          KEYCLOAK_TEST_USER_PASSWORD: "dummy-password-for-ci"
        run: docker compose up -d postgres keycloak
        
      - name: Wait for Keycloak to be ready
        working-directory: infrastructure
        run: |
          echo "Waiting for Keycloak to become ready (up to 5 minutes)..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9080/realms/Inventario/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "Keycloak is ready"
              break
            fi
            echo "Attempt $i/60: Keycloak not ready yet, sleeping 5s..."
            sleep 5
          done
          
          if ! curl -fsS http://localhost:9080/realms/Inventario/.well-known/openid-configuration >/dev/null 2>&1; then
            echo "Keycloak never became ready. Dumping docker compose status and Keycloak logs for debugging:"
            docker compose ps
            docker compose logs keycloak --tail=500 || true
            exit 1
          fi
          
      - name: Start Spring Boot Application in Background
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_db
          SPRING_DATASOURCE_USERNAME: inventory_user
          SPRING_DATASOURCE_PASSWORD: inventory_password
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:9080/realms/Inventario/protocol/openid-connect/certs
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9080/realms/Inventario
        run: |
          chmod +x gradlew
          ./gradlew bootRun > boot.log 2>&1 &
          
      - name: Wait for API to be ready
        working-directory: backend
        run: |
          echo "Esperando a que Spring Boot levante..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Attempt $i/60: API not ready yet, waiting..."
            sleep 2
          done
          
          if ! curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
            echo "API never became ready. Spring Boot logs:"
            cat boot.log
            exit 1
          fi
          
      - name: Fetch Keycloak Token
        id: fetch-token
        run: |
          TOKEN=$(curl -s -X POST http://localhost:9080/realms/Inventario/protocol/openid-connect/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=inventory-client" \
            -d "client_secret=dummy-secret-for-ci" \
            -d "grant_type=password" \
            -d "username=admin-user" \
            -d "password=dummy-password-for-ci" | jq -r '.access_token')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Failed to retrieve Keycloak token."
            exit 1
          fi
          
          # Enmascarar el token en los logs por seguridad
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          
      - name: Run Schemathesis
        run: |
          docker run --rm --network host schemathesis/schemathesis \
            run http://localhost:8080/v3/api-docs \
            -H "Authorization: Bearer ${{ steps.fetch-token.outputs.token }}"

  owasp-zap-dast: # DAST: escaneo dinámico OWASP ZAP (API scan sobre OpenAPI, autenticado)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Start Database and Keycloak via Docker Compose
        working-directory: infrastructure
        env:
          KEYCLOAK_CLIENT_SECRET: "dummy-secret-for-ci"
          KEYCLOAK_TEST_USER_PASSWORD: "dummy-password-for-ci"
        run: docker compose up -d postgres keycloak

      - name: Wait for Keycloak to be ready
        working-directory: infrastructure
        run: |
          echo "Waiting for Keycloak to become ready (up to 5 minutes)..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9080/realms/Inventario/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "Keycloak is ready"
              break
            fi
            echo "Attempt $i/60: Keycloak not ready yet, sleeping 5s..."
            sleep 5
          done

          if ! curl -fsS http://localhost:9080/realms/Inventario/.well-known/openid-configuration >/dev/null 2>&1; then
            echo "Keycloak never became ready. Dumping docker compose status and Keycloak logs for debugging:"
            docker compose ps
            docker compose logs keycloak --tail=500 || true
            exit 1
          fi

      - name: Start Spring Boot Application in Background
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_db
          SPRING_DATASOURCE_USERNAME: inventory_user
          SPRING_DATASOURCE_PASSWORD: inventory_password
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:9080/realms/Inventario/protocol/openid-connect/certs
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9080/realms/Inventario
        run: |
          chmod +x gradlew
          ./gradlew bootRun > boot.log 2>&1 &

      - name: Wait for API to be ready
        working-directory: backend
        run: |
          echo "Esperando a que Spring Boot levante..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Attempt $i/60: API not ready yet, waiting..."
            sleep 2
          done

          if ! curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
            echo "API never became ready. Spring Boot logs:"
            cat boot.log
            exit 1
          fi

      - name: Fetch Keycloak Token
        id: fetch-token
        run: |
          TOKEN=$(curl -s -X POST http://localhost:9080/realms/Inventario/protocol/openid-connect/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=inventory-client" \
            -d "client_secret=dummy-secret-for-ci" \
            -d "grant_type=password" \
            -d "username=admin-user" \
            -d "password=dummy-password-for-ci" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Failed to retrieve Keycloak token."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # ZAP API scan sobre el spec OpenAPI, autenticado inyectando el Bearer token
      # mediante la funcionalidad "replacer" de ZAP.
      - name: Run OWASP ZAP API Scan
        run: |
          # --user root: permite a ZAP escribir el reporte en el volumen montado (workspace del runner).
          # -I: no marca el paso como fallido cuando solo hay hallazgos WARN (informativos).
          docker run --network host --user root -v ${{ github.workspace }}:/zap/wrk/:rw -t zaproxy/zap-stable \
            zap-api-scan.py -t http://localhost:8080/v3/api-docs -f openapi -I \
            -z "-config replacer.full_list(0).description=auth \
                -config replacer.full_list(0).enabled=true \
                -config replacer.full_list(0).matchtype=REQ_HEADER \
                -config replacer.full_list(0).matchstr=Authorization \
                -config replacer.full_list(0).regex=false \
                -config replacer.full_list(0).replacement=Bearer\ ${{ steps.fetch-token.outputs.token }}" \
            -r zap-report.html -w zap-report.md -J zap-report.json \
            -c .zap/rules.tsv
        continue-on-error: true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
          if-no-files-found: ignore
